<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <g stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Clipboard body -->
    <rect x="28" y="20" width="72" height="84" rx="14"/>

    <!-- Clipboard clip -->
    <rect x="44" y="10" width="40" height="20" rx="8"/>

    <!-- Content lines -->
    <line x1="40" y1="48" x2="88" y2="48"/>
    <line x1="40" y1="64" x2="76" y2="64"/>

    <!-- Clock -->
    <circle cx="92" cy="92" r="20"/>

    <!-- Clock hands -->
    <line x1="92" y1="92" x2="92" y2="80"/>
    <line x1="92" y1="92" x2="102" y2="98"/>

  </g>

  <!-- Subtle playful sparkle -->
  <g fill="currentColor">
    <circle cx="108" cy="72" r="3"/>
  </g>
</svg>